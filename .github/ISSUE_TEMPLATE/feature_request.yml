name: Feature Request
description: Suggest an idea for this project
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in improving the project!
  - type: dropdown
    id: version
    attributes:
      label: Which version are you using?
      description: Are you using the free community version or the PRO version?
      options:
        - Community (Free)
        - PRO Version
    validations:
      required: true
  - type: textarea
    id: feature-desc
    attributes:
      label: Is your feature request related to a problem? Please describe.
    validations:
      required: true
  - type: textarea
    id: feature-sol
    attributes:
      label: Describe the solution you'd like
    validations:
      required: true
